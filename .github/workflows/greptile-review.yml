name: Greptile Review -> REVIEW.md

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  greptile-review:
    name: Fetch Greptile findings
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Wait for Greptile to finish reviewing
        run: |
          echo "Waiting 3 minutes for Greptile to complete its review..."
          sleep 180

      - name: Fetch Greptile findings -> REVIEW.md
        env:
          GREPTILE_API_KEY:    ${{ secrets.GREPTILE_API_KEY }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
          GITHUB_SHA:          ${{ github.sha }}
          GITHUB_REF_NAME:     ${{ github.head_ref }}
        run: python greptile_to_review.py

      - name: Commit and push REVIEW.md
        run: |
          git config user.name  "greptile-bot"
          git config user.email "greptile-bot@trailwise.ai"
          if git diff --quiet REVIEW.md; then
            echo "REVIEW.md unchanged — nothing to commit."
          else
            git add REVIEW.md
            git commit -m "chore: update REVIEW.md from Greptile [skip ci]"
            git push origin HEAD:${{ github.head_ref }}
            echo "REVIEW.md pushed to branch."
          fi
